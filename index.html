<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Bondhu</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #6C63FF;
      --primary-light: #a89cff;
      --secondary: #FF6584;
      --accent: #43E97B;
      --bg: #f0f4ff;
      --glass: rgba(255,255,255,0.65);
      --glass-border: rgba(255,255,255,0.9);
      --shadow: 0 8px 32px rgba(108,99,255,0.13);
      --user-bubble: linear-gradient(135deg, #6C63FF, #a89cff);
      --bot-bubble: rgba(255,255,255,0.82);
      --text: #2d2d4e;
      --text-light: #7b7b9d;
      --radius: 22px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: blobMove 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #a89cff; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: #FF6584; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob-3 { width: 300px; height: 300px; background: #43E97B; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 4s; }

    @keyframes blobMove {
      0% { transform: scale(1) translate(0,0); }
      100% { transform: scale(1.15) translate(30px, 20px); }
    }

    /* Main chat container */
    .chat-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      height: 92vh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), 0 2px 0 rgba(255,255,255,0.8) inset;
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .chat-header {
      padding: 20px 24px 16px;
      background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(255,101,132,0.07));
      border-bottom: 1px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(108,99,255,0.3);
      flex-shrink: 0;
      animation: avatarPulse 3s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(108,99,255,0.3); }
      50% { box-shadow: 0 4px 28px rgba(108,99,255,0.55); }
    }

    .header-info { flex: 1; }
    .header-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }
    .status span {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 500;
    }

    .header-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(108,99,255,0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      color: var(--primary);
    }
    .header-btn:hover { background: rgba(108,99,255,0.2); transform: scale(1.08); }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.2); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 24px 16px;
      animation: fadeIn 0.5s ease both;
    }
    .welcome-emoji { font-size: 48px; margin-bottom: 12px; animation: wave 2s ease-in-out infinite; display: block; }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-10deg); }
    }
    .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 6px; }
    .welcome p { font-size: 14px; color: var(--text-light); line-height: 1.6; }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }
    .chip {
      padding: 8px 14px;
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 20px;
      font-size: 12.5px;
      color: var(--primary);
      cursor: pointer;
      font-family: 'Hind Siliguri', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
    }
    .chip:hover {
      background: rgba(108,99,255,0.15);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108,99,255,0.2);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.35s cubic-bezier(.22,1,.36,1) both;
      max-width: 100%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .bot .msg-avatar { background: linear-gradient(135deg, #6C63FF22, #FF658422); }
    .user .msg-avatar { background: linear-gradient(135deg, #6C63FF, #a89cff); }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--text);
      position: relative;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 12px rgba(108,99,255,0.08);
      border-top-left-radius: 6px;
    }

    .user .bubble {
      background: var(--user-bubble);
      color: white;
      border-top-right-radius: 6px;
      box-shadow: 0 4px 16px rgba(108,99,255,0.35);
    }

    .msg-time {
      font-size: 10.5px;
      color: var(--text-light);
      margin-top: 4px;
      padding: 0 4px;
    }
    .user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease both;
    }
    .typing-dots {
      display: flex;
      gap: 5px;
      background: var(--bot-bubble);
      border: 1px solid rgba(255,255,255,0.9);
      padding: 12px 16px;
      border-radius: 18px;
      border-top-left-radius: 6px;
      box-shadow: 0 2px 12px rgba(108,99,255,0.08);
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px;
      background: rgba(255,255,255,0.6);
      border-top: 1px solid rgba(255,255,255,0.8);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(108,99,255,0.15);
      border-radius: 18px;
      padding: 8px 8px 8px 16px;
      box-shadow: 0 2px 16px rgba(108,99,255,0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(108,99,255,0.45);
      box-shadow: 0 2px 20px rgba(108,99,255,0.15);
    }

    #userInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
      padding: 4px 0;
    }
    #userInput::placeholder { color: #b0b0cc; }

    #sendBtn {
      width: 40px;
      height: 40px;
      border-radius: 13px;
      background: linear-gradient(135deg, #6C63FF, #a89cff);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(108,99,255,0.4);
    }
    #sendBtn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(108,99,255,0.5); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      margin-top: 8px;
    }

    /* Responsive */
    @media (max-width: 520px) {
      .chat-container {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        border: none;
      }
      .blob-1, .blob-2, .blob-3 { display: none; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h1>AI Bondhu</h1>
        <div class="status">
          <div class="status-dot"></div>
          <span>সর্বদা সাহায্যের জন্য প্রস্তুত</span>
        </div>
      </div>
      <button class="header-btn" onclick="clearChat()" title="চ্যাট মুছুন">🗑️</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcomeMsg">
        <span class="welcome-emoji">👋</span>
        <h2>নমস্কার! আমি AI Bondhu</h2>
        <p>আপনার যেকোনো প্রশ্নের উত্তর দিতে আমি সদা প্রস্তুত।<br/>বাংলায় কথা বলুন, আমি বুঝব!</p>
        <div class="suggestions">
          <button class="chip" onclick="sendSuggestion('বাংলাদেশের রাজধানী কোথায়?')">🏙️ রাজধানী কোথায়?</button>
          <button class="chip" onclick="sendSuggestion('একটি কবিতা লিখে দাও')">✍️ কবিতা লেখো</button>
          <button class="chip" onclick="sendSuggestion('আজকের আবহাওয়া কেমন?')">⛅ আবহাওয়া</button>
          <button class="chip" onclick="sendSuggestion('মজার একটা গল্প বলো')">📖 গল্প বলো</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="এখানে লিখুন..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter চাপুন অথবা বোতামে ক্লিক করুন</p>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    let conversationHistory = [];

    function getTime() {
      return new Date().toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function removeWelcome() {
      const w = document.getElementById('welcomeMsg');
      if (w) w.remove();
    }

    function addMessage(role, text) {
      removeWelcome();
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="msg-avatar">${isUser ? '🧑' : '🤖'}</div>
        <div>
          <div class="bubble">${text.replace(/\n/g, '<br/>')}</div>
          <div class="msg-time">${getTime()}</div>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar" style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6C63FF22,#FF658422);display:flex;align-items:center;justify-content:center;font-size:15px;">🤖</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function hideTyping() {
      const t = document.getElementById('typingIndicator');
      if (t) t.remove();
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      addMessage('user', text);

      conversationHistory.push({ role: 'user', content: text });
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await res.json();
        hideTyping();

        const reply = data.reply || data.response || 'দুঃখিত, উত্তর পাওয়া যায়নি।';
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
      } catch (err) {
        hideTyping();
        addMessage('bot', '❌ সংযোগে সমস্যা হয়েছে। একটু পরে আবার চেষ্টা করুন।');
      }
    }

    function sendSuggestion(text) {
      inputEl.value = text;
      sendMessage();
    }

    function clearChat() {
      conversationHistory = [];
      messagesEl.innerHTML = `
        <div class="welcome" id="welcomeMsg">
          <span class="welcome-emoji">👋</span>
          <h2>নমস্কার! আমি AI Bondhu</h2>
          <p>আপনার যেকোনো প্রশ্নের উত্তর দিতে আমি সদা প্রস্তুত।<br/>বাংলায় কথা বলুন, আমি বুঝব!</p>
          <div class="suggestions">
            <button class="chip" onclick="sendSuggestion('বাংলাদেশের রাজধানী কোথায়?')">🏙️ রাজধানী কোথায়?</button>
            <button class="chip" onclick="sendSuggestion('একটি কবিতা লিখে দাও')">✍️ কবিতা লেখো</button>
            <button class="chip" onclick="sendSuggestion('আজকের আবহাওয়া কেমন?')">⛅ আবহাওয়া</button>
            <button class="chip" onclick="sendSuggestion('মজার একটা গল্প বলো')">📖 গল্প বলো</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
